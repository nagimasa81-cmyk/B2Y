
name: Build Complaint Service Hub

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        shell: cmd
        run: |
          echo ===== Current Directory =====
          cd

          echo ===== Top Level =====
          dir

          echo ===== Python Files =====
          dir /s *.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable
        shell: cmd
        run: |
          pyinstaller --noconfirm --windowed --onedir --name Complaint_Service_Hub main.py

      - name: Copy config
        shell: cmd
        run: |
          if exist config (
            xcopy /E /I /Y config dist\Complaint_Service_Hub\config
          )

      - name: Copy masters
        shell: cmd
        run: |
          if exist masters (
            xcopy /E /I /Y masters dist\Complaint_Service_Hub\masters
          )

      - name: Copy templates
        shell: cmd
        run: |
          if exist templates (
            xcopy /E /I /Y templates dist\Complaint_Service_Hub\templates
          )

      - name: Copy profiles
        shell: cmd
        run: |
          if exist profiles (
            xcopy /E /I /Y profiles dist\Complaint_Service_Hub\profiles
          )

      - name: Create logs folder
        shell: cmd
        run: |
          if not exist dist\Complaint_Service_Hub\logs mkdir dist\Complaint_Service_Hub\logs

      - name: Copy README
        shell: cmd
        run: |
          if exist README_StartHere.txt (
            copy README_StartHere.txt dist\Complaint_Service_Hub\README_StartHere.txt
          )

      - name: Create distribution ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path "dist\Complaint_Service_Hub\*" `
            -DestinationPath "Complaint_Service_Hub_Distribution.zip" `
            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Complaint_Service_Hub_Distribution
          path: Complaint_Service_Hub_Distribution.zip
